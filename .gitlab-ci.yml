stages:
  - lint
  - test
  - build

variables:
  DOCKER_TLS_CERTDIR: ""
  IMAGE_NAME: $HARBOR_HOST/$HARBOR_PROJECT/$CI_PROJECT_NAME

lint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install ruff --quiet
  script:
    - ruff check . --output-format=github
  only:
    - main
    - develop
    - merge_requests

test:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install -r requirements.txt --quiet
    - pip install pytest --quiet
  script:
    - |
      if [ -d tests ]; then
        pytest tests/ -v
      else
        echo "No tests directory — skipping"
      fi
  only:
    - main
    - develop
    - merge_requests

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$HARBOR_USERNAME" -p "$HARBOR_PASSWORD" "$HARBOR_HOST"
  script:
    - docker build -t $IMAGE_NAME:$CI_COMMIT_SHORT_SHA -t $IMAGE_NAME:latest .
    - docker push $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - docker push $IMAGE_NAME:latest
  only:
    - main

